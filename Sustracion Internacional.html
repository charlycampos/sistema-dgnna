/* ── JUDICIAL STEPPER ─────────────────────────────── */
function JudicialStepper({currentStage}){
  const idx=ETAPAS_JUD.indexOf(currentStage);
  return(
    <div style={{padding:'20px 24px 16px',borderBottom:`1px solid ${BR}`,background:'#FAFBFD'}}>
      <div style={{fontSize:11,fontWeight:700,color:TX3,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:14}}>Proceso judicial</div>
      <div style={{position:'relative'}}>
        <div style={{position:'absolute',top:14,left:14,right:14,height:2,background:BR,zIndex:0}}></div>
        <div style={{position:'absolute',top:14,left:14,height:2,background:BL,zIndex:1,transition:'width .4s ease-out',width:idx<=0?0:`calc(${Math.min(idx/(ETAPAS_JUD.length-1),1)*100}% - 0px)`}}></div>
        <div style={{display:'flex',justifyContent:'space-between',position:'relative',zIndex:2}}>
          {ETAPAS_JUD.map((e,i)=>{
            const done=i<idx, active=i===idx;
            return(
              <div key={e} style={{display:'flex',flexDirection:'column',alignItems:'center',flex:1,gap:6}}>
                <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',border:`2px solid ${done||active?BL:BR}`,background:done?BL:active?'#EFF6FF':SURF,transition:'all .3s',boxShadow:active?`0 0 0 4px #EFF6FF`:'none'}}>
                  {done?<IcoCheck size={11} c="#fff"/>:<span style={{width:8,height:8,borderRadius:'50%',background:active?BL:BR}}></span>}
                </div>
                <div style={{fontSize:9,fontWeight:active?700:500,color:active?BL:done?TX2:TX3,textAlign:'center',lineHeight:1.3,maxWidth:68,wordBreak:'break-word'}}>{e}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const selS={...inpS,cursor:'pointer'};
  const Row=({label,field,type='text',opts,span=1,val})=>{
    const v=val!==undefined?val:(caso[field]??'');
    return(
      <div style={{gridColumn:`span ${span}`,padding:'12px 14px',borderRight:`1px solid ${BR}`,borderBottom:`1px solid ${BR}`}}>
        <div style={{fontSize:10,fontWeight:700,color:TX3,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:5}}>{label}</div>
        {type==='select'?(
          <select value={v} onChange={e=>onChange(field,e.target.value)} style={selS}>
            <option value="">—</option>
            {opts.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        ):type==='textarea'?(
          <textarea rows={2} value={v} onChange={e=>onChange(field,e.target.value)} style={{...inpS,resize:'none'}}/>

          <input type={type} value={v} onChange={e=>onChange(field,e.target.value)} style={inpS}/>

    <div style={{gridColumn:'span 4',background:'#F1F5F9',padding:'8px 14px',borderBottom:`1px solid ${BR}`,display:'flex',alignItems:'center',gap:8}}>

          <>
            {/* Sidebar */}
            <div style={{width:tweaks.sidebarWidth,background:N2,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
              <div style={{padding:'10px 12px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
                <div style={{position:'relative',marginBottom:8}}>
                  <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}><IcoSearch c="rgba(255,255,255,.3)"/></span>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nombre o código…"
                    style={{width:'100%',background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.14)',borderRadius:8,padding:'7px 9px 7px 30px',color:'#fff',fontSize:12,outline:'none',boxSizing:'border-box'}}/>
                </div>
                <button onClick={()=>setShowFilters(v=>!v)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',background:'none',border:'1px solid rgba(255,255,255,.15)',borderRadius:7,padding:'6px 10px',color:'rgba(255,255,255,.65)',fontSize:11}}>
                  <span style={{display:'flex',alignItems:'center',gap:5}}><IcoFilter c="rgba(255,255,255,.5)"/>Filtros {fEstado&&<span style={{background:BL,color:'#fff',borderRadius:99,padding:'0 5px',fontSize:10,fontWeight:700}}>1</span>}</span>
                  <IcoChevD c="rgba(255,255,255,.4)"/>
                </button>
                {showFilters&&(
                  <div style={{marginTop:8}}>
                    <select value={fEstado} onChange={e=>setFEstado(e.target.value)} style={{width:'100%',background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.14)',borderRadius:7,padding:'6px 9px',color:fEstado?'#fff':'rgba(255,255,255,.4)',fontSize:11,outline:'none'}}>
                      <option value="">Estado: todos</option>
                      <option value="Tramite">En trámite</option>
                      <option value="Pendiente">Pendiente</option>
                      <option value="Archivado">Archivado</option>
                    </select>
                  </div>
                )}
                <div style={{fontSize:10,color:'rgba(255,255,255,.28)',margin:'6px 1px 0',fontWeight:500}}>{filtered.length} caso{filtered.length!==1?'s':''}</div>
              </div>
              <div style={{flex:1,overflowY:'auto',padding:'6px 8px'}}>
                {filtered.map(c=><CaseCard key={c.id} caso={c} active={selected?.id===c.id} onClick={()=>{if(hasPending&&!confirm('¿Descartar cambios no guardados?'))return;setSelected(c);setPending({});setTab('ficha')}}/>)}
              </div>
            </div>

            {/* Main panel */}
            {!selected?(
              <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,color:TX3}}>
                <IcoScale size={40} c={BR}/>
                <div style={{fontSize:13}}>Selecciona un caso del panel izquierdo</div>
              </div>
            ):(
              <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}} className="anim-r">
                {/* Case header */}
                <div style={{background:SURF,padding:'12px 20px',borderBottom:`1px solid ${BR}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,gap:12}}>
                  <div style={{flex:1,overflow:'hidden'}}>
                    <div style={{fontSize:10,color:TX3,textTransform:'uppercase',letterSpacing:'.04em',fontWeight:700,marginBottom:1}}>{selected.codigo} · {selected.pais}</div>
                    <div style={{fontSize:16,fontWeight:800,color:TX,lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{selected.nnaNombre}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                    <select value={getVal('estado')||'Tramite'} onChange={e=>onChange('estado',e.target.value)}
                      style={{fontSize:12,padding:'5px 10px',borderRadius:99,background:selEstBadge.bg,color:selEstBadge.color,border:`1px solid ${selEstBadge.border}`,fontWeight:700,outline:'none',cursor:'pointer'}}>
                      <option value="Tramite">En trámite</option>
                      <option value="Pendiente">Pendiente</option>
                      <option value="Archivado">Archivado</option>
                    </select>
                    <button onClick={()=>{if(confirm(`¿Eliminar el caso ${selected.codigo}?`)){setCasos(cs=>cs.filter(c=>c.id!==selected.id));setSelected(null);setPending({})}}}
                      style={{width:32,height:32,borderRadius:8,border:'1px solid #FECACA',background:'#FEF2F2',display:'flex',alignItems:'center',justifyContent:'center',color:'#DC2626'}}>
                      <IcoTrash size={13} c="#DC2626"/>
                    </button>
                  </div>
                </div>
                {/* Pending bar */}
                {hasPending&&(
                  <div style={{background:'#FFFBEB',borderBottom:'1px solid #FDE68A',padding:'8px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
                    <span style={{fontSize:12,color:'#92400E',fontWeight:600}}>{Object.keys(pending).length} cambio{Object.keys(pending).length!==1?'s':''} sin guardar</span>
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={descartar} style={{padding:'5px 12px',borderRadius:7,border:`1px solid ${BR}`,background:SURF,color:TX2,fontSize:12,fontWeight:600}}>Descartar</button>
                      <button onClick={guardar} style={{padding:'5px 16px',borderRadius:7,border:'none',background:N2,color:'#fff',fontSize:12,fontWeight:700}}>Guardar</button>
                    </div>
                  </div>
                )}
                {/* Tabs */}
                <div style={{background:SURF,display:'flex',borderBottom:`1px solid ${BR}`,padding:'0 20px',flexShrink:0}}>
                  {[['ficha','Ficha del caso',<IcoFile size={12}/>],['bitacora','Historial de gestión',<IcoMsgSq size={12}/>],['judicial','Proceso judicial',<IcoScale size={12}/>]].map(([id,lbl,ico])=>(
                    <button key={id} onClick={()=>setTab(id)}
                      style={{display:'flex',alignItems:'center',gap:6,padding:'10px 14px',fontSize:12,background:'none',border:'none',borderBottom:`2px solid ${tab===id?N2:'transparent'}`,color:tab===id?N2:TX2,fontWeight:tab===id?700:500,marginBottom:-1,cursor:'pointer'}}>
                      {ico}{lbl}
                    </button>
                  ))}
                </div>
                {/* Tab content */}
                <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
                  {tab==='ficha'&&<FichaTab caso={{...selected,...pending}} onChange={onChange}/>}
                  {tab==='bitacora'&&<BitacoraTab caso={selected} addEntry={addBit} removeEntry={removeBit}/>}
                  {tab==='judicial'&&<JudicialTab caso={{...selected,...pending}} onChange={onChange}/>}
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {showNew&&<NewCaseModal onSave={f=>{const nc={...f,id:`c${++_nid}`,bitacora:[],historialJudicial:[],creadoPor:'Usuario actual',estadoJudicial:'Sin demanda'};setCasos(cs=>[nc,...cs]);setSelected(nc);setPending({});setShowNew(false)}} onClose={()=>setShowNew(false)}/>}

      <TweaksPanel>
        <TweakSection title="Diseño">
          <TweakSlider id="sidebarWidth" label="Ancho del panel" min={260} max={420} step={10} value={tweaks.sidebarWidth} onChange={v=>setTweak('sidebarWidth',v)}/>
          <TweakToggle id="compactCards" label="Tarjetas compactas" value={tweaks.compactCards} onChange={v=>setTweak('compactCards',v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
